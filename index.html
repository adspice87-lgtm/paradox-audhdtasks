<!--
  ════════════════════════════════════════════════════════════════════════
  PARADOX — samodzielny build (jeden plik). Wrzuć na Cloudflare Pages.
  Dane: localStorage (lokalnie w przeglądarce, przeżywają refresh).
  ────────────────────────────────────────────────────────────────────────
  AI "Rozbij to za mnie" — dwie drogi (ustaw w ⚙ Ustawienia):
   1) ZALECANE: Cloudflare Worker proxy (klucz NIE leży w froncie).
      Worker (oth-api style) ma przyjąć POST {title} i zwrócić JSON:
      ["krok 1","krok 2",...]. Minimalny worker:
 
      export default {
        async fetch(req, env) {
          const cors = { "Access-Control-Allow-Origin":"*",
            "Access-Control-Allow-Methods":"POST,OPTIONS",
            "Access-Control-Allow-Headers":"content-type" };
          if (req.method === "OPTIONS") return new Response(null,{headers:cors});
          const { title } = await req.json();
          const r = await fetch("https://api.anthropic.com/v1/messages",{
            method:"POST",
            headers:{ "content-type":"application/json",
              "x-api-key":env.ANTHROPIC_API_KEY, "anthropic-version":"2023-06-01" },
            body:JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:1000,
              messages:[{role:"user",content:
                `Rozbij zadanie na 5 konkretnych podzadań po polsku. Zadanie: "${title}". `+
                `Odpowiedz WYŁĄCZNIE tablicą JSON stringów, bez markdown.`}] })
          });
          const d = await r.json();
          const text = d.content.filter(b=>b.type==="text").map(b=>b.text).join("");
          return new Response(text,{headers:{...cors,"content-type":"application/json"}});
        }
      }
 
   2) SZYBKIE: wklej klucz Anthropic w ustawieniach (UWAGA: widoczny w froncie,
      tylko do osobistego użytku — nie udostępniaj wtedy publicznie).
  ════════════════════════════════════════════════════════════════════════
-->

/* ── icon wrapper backed by lucide UMD ── */
function Ic({ name, size = 16, className, style }) {
  const lib = (window.lucide && (window.lucide.icons || window.lucide)) || {};
  const node = lib[name];
  if (!node || !Array.isArray(node))
    return React.createElement("span", { style: { display: "inline-block", width: size, height: size } });
  return React.createElement("svg",
    { width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor",
      strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round", className, style },
    node.map((c, i) => React.createElement(c[0], Object.assign({ key: i }, c[1]))));
}

  { label: "1h", v: 60 }, { label: "2h", v: 120 }, { label: "Pół dnia", v: 240 }, { label: "Cały dzień", v: 480 },
];

/* ── localStorage persistence ── */
const KEY = "paradox:v1:";
const load = (k, d) => { try { const v = localStorage.getItem(KEY + k); return v ? JSON.parse(v) : d; } catch (e) { return d; } };
const save = (k, v) => { try { localStorage.setItem(KEY + k, JSON.stringify(v)); } catch (e) {} };
 
function parseTime(raw) {
  if (!raw) return null;
  const s = raw.toLowerCase().trim().replace(",", ".");
  if (s.includes("pół dnia") || s.includes("pol dnia")) return 240;
  if (s.includes("cały dzień") || s.includes("caly dzien")) return 480;
  if (s.includes("półtorej") || s.includes("poltorej") || s.includes("1.5")) return 90;
  if (s.includes("pół godziny") || s.includes("pol godziny")) return 30;
  let m = s.match(/(\d+(?:\.\d+)?)\s*h(?:our|odz)?\D*(\d+)?\s*m?/);
  if (m) { const h = parseFloat(m[1]) || 0; const mm = m[2] ? parseInt(m[2]) : 0; return Math.round(h * 60 + mm); }
  m = s.match(/(\d+)\s*m(?:in)?/); if (m) return parseInt(m[1]);
  m = s.match(/(\d+(?:\.\d+)?)\s*h/); if (m) return Math.round(parseFloat(m[1]) * 60);
  m = s.match(/^(\d+)$/); if (m) return parseInt(m[1]);
  return null;
}
function fmtMin(min) { if (min == null) return ""; const h = Math.floor(min / 60), m = min % 60; return h ? (m ? h + "h " + m + "m" : h + "h") : m + "m"; }
function fmtDur(ms) { const t = Math.floor(ms / 1000); const h = Math.floor(t / 3600), m = Math.floor((t % 3600) / 60), s = t % 60; return [h, m, s].map((x) => String(x).padStart(2, "0")).join(":"); }
function deadlineState(dl) { if (!dl) return null; const diff = dl - now(); if (diff < 0) return "overdue"; if (diff < 48 * 3600e3) return "soon"; return "ok"; }
function fmtTime(ts) { return new Intl.DateTimeFormat("pl-PL", { hour: "2-digit", minute: "2-digit" }).format(ts); }
function dayKey(ts) { return new Intl.DateTimeFormat("pl-PL", { year: "numeric", month: "long", day: "numeric", weekday: "long" }).format(ts); }
function tint(c) { return { background: c + "22", color: c, borderColor: c + "44" }; }
function toLocalInput(ts) { const d = new Date(ts); const p = (n) => String(n).padStart(2, "0"); return d.getFullYear() + "-" + p(d.getMonth() + 1) + "-" + p(d.getDate()) + "T" + p(d.getHours()) + ":" + p(d.getMinutes()); }
 
const FILTER_DEFS = [
  { key: "lowE", label: "Niska energia", icon: "Battery", test: (t) => t.energy === "LOW" },
  { key: "creative", label: "Kreatywne", icon: "Palette", test: (t) => t.type === "CREATIVE" },
  { key: "analytical", label: "Analityczne", icon: "Brain", test: (t) => t.type === "ANALYTICAL" },
  { key: "mechanical", label: "Mechaniczne", icon: "Wrench", test: (t) => t.type === "MECHANICAL" },
  { key: "iu", label: "Ważne i pilne", icon: "Flame", test: (t) => t.isImportant && t.isUrgent },
  { key: "q15", label: "Max 15 min", icon: "Clock", test: (t) => t.estMin != null && t.estMin <= 15 },
];
 
function collectSubtree(tasks, rootId) {
  const set = new Set([rootId]); let changed = true;
  while (changed) { changed = false; for (const t of tasks) if (t.parentId && set.has(t.parentId) && !set.has(t.id)) { set.add(t.id); changed = true; } }
  return set;
}
function filterTasks(tasks, filters, scopeProject) {
  let list = tasks.filter((t) => t.status !== "DONE" && t.status !== "FROZEN");
  if (scopeProject) list = list.filter((t) => t.projectId === scopeProject);
  for (const k of filters) { const def = FILTER_DEFS.find((f) => f.key === k); if (def) list = list.filter(def.test); }
  return list.sort((a, b) => {
    const ia = a.isImportant && a.isUrgent ? 0 : 1, ib = b.isImportant && b.isUrgent ? 0 : 1;
    return ia - ib || a.position - b.position;
  });
}
function buildJournal(tasks, projects) {
  const done = tasks.filter((t) => t.status === "DONE" && t.completedAt).sort((a, b) => b.completedAt - a.completedAt);
  const startToday = new Date(); startToday.setHours(0, 0, 0, 0);
  const todayItems = done.filter((t) => t.completedAt >= startToday.getTime());
  const todayMin = todayItems.reduce((s, t) => s + (t.actualMin || 0), 0);
  const importantCount = done.filter((t) => t.isImportant).length;
  const groups = {};
  for (const t of done) {
    const k = dayKey(t.completedAt);
    (groups[k] = groups[k] || []).push(Object.assign({}, t, {
      projectTitle: (projects.find((p) => p.id === t.projectId) || {}).title,
      projectColor: (projects.find((p) => p.id === t.projectId) || {}).color,
    }));
  }
  return { days: Object.entries(groups).map(([key, items]) => ({ key, items })), todayMin, todayCount: todayItems.length, importantCount };
}

    completedAt: null, position: 0, collapsed: false,

/* ─────────────────  ACTION VIEW  ───────────────── */
function ActionView(props) {

  const toggleFilter = (k) => setFilters((f) => { const n = new Set(f); n.has(k) ? n.delete(k) : n.add(k); return n; });
  const flat = useMemo(() => filterTasks(tasks, filters, scopeProject), [tasks, filters, scopeProject]);
  const hasFilters = filters.size > 0;
  const proj = projects.find((p) => p.id === scopeProject);
  const roots = tasks.filter((t) => t.status !== "DONE" && t.parentId == null && (scopeProject == null || t.projectId === scopeProject)).sort((a, b) => a.position - b.position);
 
  const rowProps = { tasks, selected: selectedTask, setSelected: setSelectedTask, highlight, toggleDone, patchTask, newSiblingBelow, indentTask, outdentTask, deleteTask };
 
  return (
    <>
      <div className="view-head">
        <h1>{proj ? proj.title : "Menu zadań"}</h1>
        <div className="vh-actions">

/* ─────────────────  TASK ROW (recursive)  ───────────────── */
function TaskRow(props) {
  const { task, tasks, depth, selected, setSelected, highlight, toggleDone, patchTask, newSiblingBelow, indentTask, outdentTask, deleteTask, flatMode } = props;
  const children = useMemo(() => tasks.filter((t) => t.parentId === task.id && t.status !== "DONE").sort((a, b) => a.position - b.position), [tasks, task.id]);
  const allKids = useMemo(() => tasks.filter((t) => t.parentId === task.id), [tasks, task.id]);
  const doneKids = allKids.filter((t) => t.status === "DONE").length;
  const progress = allKids.length ? doneKids / allKids.length : null;
 
  const [editing, setEditing] = useState(task.title === "");
  const [draft, setDraft] = useState(task.title);
  const inputRef = useRef(null);
  useEffect(() => { if (editing) inputRef.current && inputRef.current.focus(); }, [editing]);
 
  const dl = deadlineState(task.deadline);
  const isSel = selected === task.id;
  const isHi = highlight === task.id;
  const [over, setOver] = useState(false);
 
  const commit = () => { patchTask(task.id, { title: draft.trim() || "Bez nazwy" }); setEditing(false); };
  const onKey = (e) => {
    if (e.key === "Enter") { e.preventDefault(); commit(); const nid = newSiblingBelow(task.id); setTimeout(() => setSelected(nid), 0); }
    else if (e.key === "Tab" && !e.shiftKey) { e.preventDefault(); commit(); indentTask(task.id); }
    else if (e.key === "Tab" && e.shiftKey) { e.preventDefault(); commit(); outdentTask(task.id); }
    else if (e.key === "Escape") { setEditing(false); setDraft(task.title); }
  };
 
  return (
    <div className="task-branch" style={{ marginLeft: flatMode ? 0 : depth ? 20 : 0 }}>
      {!flatMode && depth > 0 && <span className="guide" />}
      <div className={"task" + (isSel ? " sel" : "") + (isHi ? " hi" : "") + (dl ? " dl-" + dl : "") + (over ? " drop" : "")}
        onClick={() => setSelected(task.id)}
        onDragOver={(e) => { e.preventDefault(); setOver(true); }} onDragLeave={() => setOver(false)}
        onDrop={(e) => { setOver(false); const taskId = e.dataTransfer.getData("task"); if (taskId && taskId !== task.id) patchTask(taskId, { parentId: task.id }); }}
        draggable={!editing} onDragStart={(e) => e.dataTransfer.setData("task", task.id)}>
        {allKids.length > 0 ? (
          <button className="caret" onClick={(e) => { e.stopPropagation(); patchTask(task.id, { collapsed: !task.collapsed }); }}>
            <Ic name={task.collapsed ? "ChevronRight" : "ChevronDown"} size={14} />
          </button>
        ) : <span className="caret-spacer" />}
 
        <button className={"check" + (task.status === "DONE" ? " done" : "")} onClick={(e) => { e.stopPropagation(); toggleDone(task.id); }}>
          {task.status === "DONE" && <Ic name="Check" size={12} />}
        </button>
 
        {editing ? (
          <input ref={inputRef} className="task-input" value={draft} onChange={(e) => setDraft(e.target.value)} onBlur={commit} onKeyDown={onKey}
            placeholder="Nazwa zadania… (Enter = kolejne, Tab = wcięcie)" />
        ) : (
          <span className={"task-title" + (task.status === "DONE" ? " strike" : "")} onDoubleClick={() => { setDraft(task.title); setEditing(true); }}>
            {task.title || "Bez nazwy"}
          </span>
        )}
 
        <div className="badges">
          {task.isImportant && task.isUrgent && <span className="badge fire"><Ic name="Flame" size={11} /></span>}
          {task.energy && <span className="badge" style={tint(ENERGY[task.energy].color)}><Ic name="Battery" size={11} /></span>}
          {task.type && <span className="badge" style={tint(TYPE[task.type].color)}><Ic name={TYPE[task.type].icon} size={11} /></span>}
          {task.estMin != null && <span className="badge"><Ic name="Clock" size={11} /> {fmtMin(task.estMin)}</span>}
          {dl === "overdue" && <span className="badge late">Zaległe</span>}
        </div>
 
        <div className="row-actions">
          <button title="Usuń" onClick={(e) => { e.stopPropagation(); deleteTask(task.id); }}><Ic name="Trash2" size={13} /></button>
        </div>
      </div>
 
      {progress != null && !task.collapsed && (
        <div className="dopamine" style={{ marginLeft: flatMode ? 0 : 24 }}>
          <div className="dopamine-fill" style={{ width: progress * 100 + "%" }} />
          <span className="dopamine-label mono">{doneKids}/{allKids.length}</span>
        </div>
      )}
 
      {!task.collapsed && !flatMode && children.map((c) => (
        <TaskRow key={c.id} task={c} depth={depth + 1} tasks={tasks} selected={selected} setSelected={setSelected} highlight={highlight}
          toggleDone={toggleDone} patchTask={patchTask} newSiblingBelow={newSiblingBelow} indentTask={indentTask} outdentTask={outdentTask} deleteTask={deleteTask} />
      ))}
    </div>
  );
}
 
/* ─────────────────  RIGHT PANEL  ───────────────── */
function RightPanel(props) {
  const { tasks, projects, selectedTask, scopeProject, patchTask, incubator, addIncubator, incubatorToTask, setTasks, settings, aiEnabled, openSettings } = props;
  const task = tasks.find((t) => t.id === selectedTask);
 
  if (!task) {
    const proj = projects.find((p) => p.id === scopeProject);
    return (
      <div className="rp">
        {proj ? (
          <>
            <div className="rp-head"><span className="dot" style={{ background: proj.color }} /> {proj.title}</div>
            <Incubator parentType="project" parentId={proj.id} notes={incubator} add={addIncubator} toTask={incubatorToTask} />
          </>
        ) : (
          <div className="rp-empty"><Ic name="Lightbulb" size={28} /><p>Kliknij zadanie lub projekt, żeby zobaczyć właściwości i inkubator pomysłów.</p></div>
        )}
      </div>
    );
  }
  return <TaskProps task={task} tasks={tasks} patchTask={patchTask} setTasks={setTasks} incubator={incubator} addIncubator={addIncubator} incubatorToTask={incubatorToTask} settings={settings} aiEnabled={aiEnabled} openSettings={openSettings} />;
}
 
function TaskProps({ task, tasks, patchTask, setTasks, incubator, addIncubator, incubatorToTask, settings, aiEnabled, openSettings }) {
  const [timeInput, setTimeInput] = useState("");
  useEffect(() => { setTimeInput(""); }, [task.id]);
 
  return (
    <div className="rp">
      <div className="rp-head">Właściwości</div>
      <div className="prop-row">
        <Toggle label="Ważne?" on={task.isImportant} onClick={() => patchTask(task.id, { isImportant: !task.isImportant })} />
        <Toggle label="Pilne?" on={task.isUrgent} onClick={() => patchTask(task.id, { isUrgent: !task.isUrgent })} danger />
      </div>
 
      <div className="prop">
        <div className="prop-label"><Ic name="Battery" size={13} /> Energia</div>
        <div className="seg">
          {Object.entries(ENERGY).map(([k, v]) => (
            <button key={k} className={"seg-btn" + (task.energy === k ? " on" : "")} style={task.energy === k ? { background: v.color + "22", color: v.color, borderColor: v.color + "55" } : {}}
              onClick={() => patchTask(task.id, { energy: task.energy === k ? null : k })}>{v.label}</button>
          ))}
        </div>
      </div>
 
      <div className="prop">
        <div className="prop-label"><Ic name="Palette" size={13} /> Typ</div>
        <div className="seg">
          {Object.entries(TYPE).map(([k, v]) => (
            <button key={k} className={"seg-btn" + (task.type === k ? " on" : "")} style={task.type === k ? { background: v.color + "22", color: v.color, borderColor: v.color + "55" } : {}}
              onClick={() => patchTask(task.id, { type: task.type === k ? null : k })}>{v.label}</button>
          ))}
        </div>
      </div>
 
      <div className="prop">
        <div className="prop-label"><Ic name="Clock" size={13} /> Szacowany czas</div>
        <div className="chips">
          {TIME_CHIPS.map((c) => (
            <button key={c.v} className={"chip" + (task.estMin === c.v ? " on" : "")} onClick={() => patchTask(task.id, { estMin: task.estMin === c.v ? null : c.v })}>{c.label}</button>
          ))}
        </div>
        <input className="fuzzy" placeholder='ręcznie: "1.5h", "90m", "półtorej godziny"…' value={timeInput}
          onChange={(e) => setTimeInput(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter") { const v = parseTime(timeInput); if (v != null) patchTask(task.id, { estMin: v }); setTimeInput(""); } }} />
        {parseTime(timeInput) != null && <span className="fuzzy-hint">→ {fmtMin(parseTime(timeInput))}</span>}
      </div>
 
      <div className="prop">
        <div className="prop-label"><Ic name="Calendar" size={13} /> Deadline</div>
        <input type="datetime-local" className="dt" value={task.deadline ? toLocalInput(task.deadline) : ""}
          onChange={(e) => patchTask(task.id, { deadline: e.target.value ? new Date(e.target.value).getTime() : null })} />
        {deadlineState(task.deadline) === "soon" && <span className="dl-warn">⚠ mniej niż 48h</span>}
        {deadlineState(task.deadline) === "overdue" && <span className="dl-warn over">⚠ zaległe — bez paniki, tylko tag</span>}
      </div>
 
      <AIBreakdown task={task} setTasks={setTasks} tasks={tasks} settings={settings} aiEnabled={aiEnabled} openSettings={openSettings} />
      <Incubator parentType="task" parentId={task.id} notes={incubator} add={addIncubator} toTask={incubatorToTask} />
    </div>
  );
}
 
function Toggle({ label, on, onClick, danger }) {
  return <button className={"toggle" + (on ? (danger ? " on danger" : " on") : "")} onClick={onClick}><span className="toggle-dot" /> {label}</button>;
}
 
/* ─────────────────  AI BREAKDOWN  ───────────────── */
function AIBreakdown({ task, setTasks, tasks, settings, aiEnabled, openSettings }) {
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState(null);
 
  const addSteps = (steps) => {
    const base = tasks.filter((t) => t.parentId === task.id).length;
    steps.slice(0, 5).forEach((s, i) => setTimeout(() => setTasks((ts) => [...ts, mkTask({ title: String(s), projectId: task.projectId, parentId: task.id, position: base + i })]), i * 140));
  };
 
  const run = async () => {
    setLoading(true); setErr(null);
    try {
      let steps;
      if (settings.workerUrl) {
        const res = await fetch(settings.workerUrl, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ title: task.title }) });
        const text = (await res.text()).replace(/```json|```/g, "").trim();
        steps = JSON.parse(text);
      } else {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "content-type": "application/json", "x-api-key": settings.apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
          body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, messages: [{ role: "user", content: 'Rozbij to zadanie na 5 konkretnych, wykonalnych podzadań po polsku. Zadanie: "' + task.title + '". Odpowiedz WYŁĄCZNIE tablicą JSON stringów, bez markdown.' }] }),
        });
        const data = await res.json();
        const text = data.content.filter((b) => b.type === "text").map((b) => b.text).join("").replace(/```json|```/g, "").trim();
        steps = JSON.parse(text);
      }
      addSteps(steps);
    } catch (e) { setErr("Nie udało się rozbić — sprawdź endpoint/klucz w ustawieniach."); }
    finally { setLoading(false); }
  };
 
  return (
    <div className="prop">
      <button className="btn accent full" onClick={aiEnabled ? run : openSettings} disabled={loading}>
        <Ic name="Sparkles" size={15} /> {loading ? "Rozbijam…" : aiEnabled ? "Rozbij to za mnie" : "Włącz AI w ustawieniach"}
      </button>
      {err && <span className="dl-warn over">{err}</span>}
    </div>
  );
}
 
/* ─────────────────  INCUBATOR  ───────────────── */
function Incubator({ parentType, parentId, notes, add, toTask }) {
  const mine = notes.filter((n) => n.parentType === parentType && n.parentId === parentId);
  const [draft, setDraft] = useState("");
  return (
    <div className="incubator">
      <div className="rp-head soft"><Ic name="Lightbulb" size={13} /> Inkubator pomysłów</div>
      <div className="sticky-wrap">
        {mine.map((n) => (
          <div key={n.id} className="sticky"><span>{n.content}</span><button title="Przekształć w zadanie" onClick={() => toTask(n)}><Ic name="Zap" size={13} /></button></div>
        ))}
        {mine.length === 0 && <div className="muted-sm">Luźne myśli lądują tu bez zobowiązań.</div>}
      </div>
      <input className="incu-add" placeholder="Dodaj luźny pomysł…" value={draft} onChange={(e) => setDraft(e.target.value)}
        onKeyDown={(e) => { if (e.key === "Enter" && draft.trim()) { add(parentType, parentId, draft.trim()); setDraft(""); } }} />
    </div>
  );
}
 
/* ─────────────────  JOURNAL  ───────────────── */
function JournalView({ data }) {
  return (
    <>
      <div className="view-head"><h1>Dziennik dokonań</h1><span className="muted-sm">Ta-da! Co dziś poszło z głowy.</span></div>
      <div className="task-scroll">
        <div className="dash">
          <div className="dash-card"><Ic name="Clock" size={18} /><div><b className="mono">{fmtMin(data.todayMin) || "0m"}</b><span>przepracowane dziś</span></div></div>
          <div className="dash-card"><Ic name="Trophy" size={18} /><div><b className="mono">{data.todayCount}</b><span>ukończone dziś</span></div></div>
          <div className="dash-card"><Ic name="Flame" size={18} /><div><b className="mono">{data.importantCount}</b><span>ważne zamknięte</span></div></div>
        </div>
        {data.days.length === 0 && <div className="empty"><div className="empty-emoji">📭</div><div className="empty-title">Jeszcze nic tu nie ma</div><div className="empty-sub">Odhacz zadanie albo zaloguj sesję flow.</div></div>}
        {data.days.map((d) => (
          <div key={d.key} className="jday">
            <div className="jday-head">{d.key}</div>
            {d.items.map((it) => (
              <div key={it.id} className="jitem">
                <span className="jtime mono">{fmtTime(it.completedAt)}</span>
                <Ic name="Check" size={13} className="jcheck" />
                <span className="jtitle">{it.title}</span>
                {it.projectTitle && <span className="jproj" style={{ color: it.projectColor }}>{it.projectTitle}</span>}
                {it.actualMin != null && <span className="jdur mono">{fmtMin(it.actualMin)}</span>}
              </div>
            ))}
          </div>
        ))}
      </div>
    </>
  );
}
 
/* ─────────────────  MODALS  ───────────────── */
function InboxModal({ onSave, onClose }) {
  const [v, setV] = useState(""); const ref = useRef(null);
  useEffect(() => { ref.current && ref.current.focus(); }, []);
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal inbox-modal" onClick={(e) => e.stopPropagation()}>
        <input ref={ref} value={v} onChange={(e) => setV(e.target.value)} placeholder="Co masz w głowie? Enter = zapisane."
          onKeyDown={(e) => { if (e.key === "Enter" && v.trim()) { onSave(v.trim()); onClose(); } }} />
        <span className="modal-hint">Tylko zapis. Segregacja później. <Ic name="CornerDownLeft" size={12} /></span>
      </div>
    </div>
  );
}
 
function CommandPalette({ commands, onClose }) {
  const [q, setQ] = useState(""); const [idx, setIdx] = useState(0); const ref = useRef(null);
  useEffect(() => { ref.current && ref.current.focus(); }, []);
  const list = commands.filter((c) => c.label.toLowerCase().includes(q.toLowerCase()));
  const onKey = (e) => {
    if (e.key === "ArrowDown") { e.preventDefault(); setIdx((i) => Math.min(i + 1, list.length - 1)); }
    else if (e.key === "ArrowUp") { e.preventDefault(); setIdx((i) => Math.max(i - 1, 0)); }
    else if (e.key === "Enter") { e.preventDefault(); list[idx] && list[idx].run(); onClose(); }
  };
  return (
    <div className="overlay top" onClick={onClose}>
      <div className="modal palette" onClick={(e) => e.stopPropagation()}>
        <input ref={ref} value={q} onChange={(e) => { setQ(e.target.value); setIdx(0); }} onKeyDown={onKey} placeholder="Czego potrzebujesz?" />
        <div className="palette-list">
          {list.map((c, i) => (
            <button key={c.label} className={"palette-item" + (i === idx ? " on" : "")} onMouseEnter={() => setIdx(i)} onClick={() => { c.run(); onClose(); }}>
              <Ic name={c.icon} size={15} /> {c.label}
            </button>
          ))}
          {list.length === 0 && <div className="muted-sm" style={{ padding: 12 }}>Nic nie pasuje.</div>}
        </div>
      </div>
    </div>
  );
}
 
function FlowStopModal({ ms, projects, onCommit, onClose }) {
  const [name, setName] = useState(""); const [proj, setProj] = useState(""); const ref = useRef(null);
  useEffect(() => { ref.current && ref.current.focus(); }, []);
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal flow-modal" onClick={(e) => e.stopPropagation()}>
        <div className="flow-cheer">Super robota! Spędziłeś <b className="mono">{fmtDur(ms)}</b></div>
        <input ref={ref} value={name} onChange={(e) => setName(e.target.value)} placeholder="Nad czym pracowałeś?" onKeyDown={(e) => { if (e.key === "Enter") onCommit(name, proj || null); }} />
        <select value={proj} onChange={(e) => setProj(e.target.value)}>
          <option value="">— bez projektu —</option>
          {projects.map((p) => <option key={p.id} value={p.id}>{p.title}</option>)}
        </select>
        <button className="btn accent full" onClick={() => onCommit(name, proj || null)}>Zapisz do dziennika</button>
      </div>
    </div>
  );
}
 
function RetroModal({ projects, onCommit, onClose }) {
  const [name, setName] = useState(""); const [time, setTime] = useState(""); const [proj, setProj] = useState(""); const ref = useRef(null);
  useEffect(() => { ref.current && ref.current.focus(); }, []);
  const min = parseTime(time);
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal flow-modal" onClick={(e) => e.stopPropagation()}>
        <div className="flow-cheer"><Ic name="History" size={16} /> Właśnie to zrobiłem</div>
        <input ref={ref} value={name} onChange={(e) => setName(e.target.value)} placeholder="Co zrobione?" />
        <input value={time} onChange={(e) => setTime(e.target.value)} placeholder='Ile zajęło? "45m", "1.5h"…' />
        {min != null && <span className="fuzzy-hint">→ {fmtMin(min)}</span>}
        <select value={proj} onChange={(e) => setProj(e.target.value)}>
          <option value="">— bez projektu —</option>
          {projects.map((p) => <option key={p.id} value={p.id}>{p.title}</option>)}
        </select>
        <button className="btn accent full" onClick={() => onCommit(name, min, proj || null)}>Zaloguj jako zrobione</button>
      </div>
    </div>
  );
}
 
function SettingsModal({ settings, setSettings, onClose }) {
  const [worker, setWorker] = useState(settings.workerUrl || "");
  const [key, setKey] = useState(settings.apiKey || "");
  const reset = () => { if (confirm("Wyczyścić wszystkie dane Paradoxa z tej przeglądarki?")) { Object.keys(localStorage).filter((k) => k.startsWith("paradox:")).forEach((k) => localStorage.removeItem(k)); location.reload(); } };
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal settings" onClick={(e) => e.stopPropagation()}>
        <h2>Ustawienia</h2>
        <div className="set-field">
          <label>Endpoint AI — Cloudflare Worker URL (zalecane)</label>
          <input value={worker} onChange={(e) => setWorker(e.target.value)} placeholder="https://twoj-worker.workers.dev" />
          <div className="set-note">Worker trzyma klucz Anthropic po stronie serwera. Przyjmuje POST {"{title}"}, zwraca tablicę JSON.</div>
        </div>
        <div className="set-divider" />
        <div className="set-field">
          <label>albo klucz Anthropic API (szybkie)</label>
          <input type="password" value={key} onChange={(e) => setKey(e.target.value)} placeholder="sk-ant-…" />
          <div className="set-note warn">⚠ Klucz będzie widoczny w przeglądarce. Używaj tylko prywatnie — nie udostępniaj wtedy builda publicznie.</div>
        </div>
        <button className="btn accent full" onClick={() => { setSettings({ workerUrl: worker.trim(), apiKey: key.trim() }); onClose(); }}>Zapisz</button>
        <button className="btn danger full" onClick={reset}>Wyczyść wszystkie dane</button>
      </div>
    </div>
  );
}
 
ReactDOM.createRoot(document.getElementById("root")).render(<Paradox />);
</script>
